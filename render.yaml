services:
  - type: web
    name: gaborone-reserve-api
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        fromDatabase:
          name: gaborone-reserve-db
          property: connectionString

databases:
  - name: gaborone-reserve-db
    databaseName: gaborone_reserve
    user: postgres
    plan: free
